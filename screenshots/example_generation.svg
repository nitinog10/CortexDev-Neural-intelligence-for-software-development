  <circle cx="46" cy="24" r="7" fill="#febc2e"/>
  <circle cx="68" cy="24" r="7" fill="#28c840"/>
  <text x="410" y="30" font-family="monospace" font-size="14" fill="#cdd6f4" text-anchor="middle" font-weight="bold">CortexDev — Example Code Generation</text>

  <!-- INPUT section -->
  <rect x="20" y="62" width="378" height="290" rx="8" fill="#181825" stroke="#45475a" stroke-width="1"/>
  <rect x="20" y="62" width="378" height="36" rx="8" fill="#313244"/>
