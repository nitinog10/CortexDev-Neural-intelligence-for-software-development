  <text x="40" y="128" font-family="monospace" font-size="13" fill="#cdd6f4">Write a Python function</text>
  <text x="40" y="148" font-family="monospace" font-size="13" fill="#cdd6f4">to check if a number</text>
  <text x="40" y="168" font-family="monospace" font-size="13" fill="#cdd6f4">is prime.</text>

  <!-- Arrow -->
  <line x1="420" y1="207" x2="395" y2="207" stroke="#89b4fa" stroke-width="2"/>
  <polygon points="420,207 410,201 410,213" fill="#89b4fa"/>

  <!-- OUTPUT section -->
  <rect x="422" y="62" width="378" height="290" rx="8" fill="#181825" stroke="#45475a" stroke-width="1"/>
  <rect x="422" y="62" width="378" height="36" rx="8" fill="#313244"/>
  <rect x="422" y="90" width="378" height="8" fill="#313244"/>
  <text x="611" y="85" font-family="monospace" font-size="13" fill="#a6e3a1" text-anchor="middle" font-weight="bold">📤  Generated Code</text>

  <text x="442" y="120" font-family="monospace" font-size="12" fill="#cba6f7">def</text>
  <text x="472" y="120" font-family="monospace" font-size="12" fill="#89b4fa">is_prime</text>
  <text x="542" y="120" font-family="monospace" font-size="12" fill="#cdd6f4">(</text>
  <text x="550" y="120" font-family="monospace" font-size="12" fill="#fab387">n</text>
  <text x="558" y="120" font-family="monospace" font-size="12" fill="#cdd6f4">):</text>

  <text x="458" y="142" font-family="monospace" font-size="12" fill="#cba6f7">if</text>
  <text x="478" y="142" font-family="monospace" font-size="12" fill="#fab387">n</text>
  <text x="490" y="142" font-family="monospace" font-size="12" fill="#89dceb">&lt;=</text>
  <text x="510" y="142" font-family="monospace" font-size="12" fill="#fab387">1</text>
  <text x="520" y="142" font-family="monospace" font-size="12" fill="#cdd6f4">:</text>

  <text x="474" y="162" font-family="monospace" font-size="12" fill="#cba6f7">return</text>
  <text x="534" y="162" font-family="monospace" font-size="12" fill="#fab387">False</text>

  <text x="458" y="184" font-family="monospace" font-size="12" fill="#cba6f7">for</text>
  <text x="484" y="184" font-family="monospace" font-size="12" fill="#fab387">i</text>
  <text x="494" y="184" font-family="monospace" font-size="12" fill="#cba6f7">in</text>
  <text x="514" y="184" font-family="monospace" font-size="12" fill="#89b4fa">range</text>
  <text x="556" y="184" font-family="monospace" font-size="12" fill="#cdd6f4">(2,</text>
  <text x="584" y="184" font-family="monospace" font-size="12" fill="#89b4fa">int</text>
  <text x="608" y="184" font-family="monospace" font-size="12" fill="#cdd6f4">(</text>
  <text x="614" y="184" font-family="monospace" font-size="12" fill="#fab387">n</text>
  <text x="622" y="184" font-family="monospace" font-size="12" fill="#89dceb">**</text>
  <text x="636" y="184" font-family="monospace" font-size="12" fill="#fab387">0.5</text>
  <text x="660" y="184" font-family="monospace" font-size="12" fill="#cdd6f4">)+1):</text>

  <text x="474" y="206" font-family="monospace" font-size="12" fill="#cba6f7">if</text>
  <text x="494" y="206" font-family="monospace" font-size="12" fill="#fab387">n</text>
  <text x="506" y="206" font-family="monospace" font-size="12" fill="#89dceb">%</text>
  <text x="518" y="206" font-family="monospace" font-size="12" fill="#fab387">i</text>
  <text x="528" y="206" font-family="monospace" font-size="12" fill="#89dceb">==</text>
  <text x="548" y="206" font-family="monospace" font-size="12" fill="#fab387">0</text>
  <text x="558" y="206" font-family="monospace" font-size="12" fill="#cdd6f4">:</text>

  <text x="490" y="226" font-family="monospace" font-size="12" fill="#cba6f7">return</text>
  <text x="550" y="226" font-family="monospace" font-size="12" fill="#fab387">False</text>

  <text x="458" y="248" font-family="monospace" font-size="12" fill="#cba6f7">return</text>
  <text x="518" y="248" font-family="monospace" font-size="12" fill="#fab387">True</text>

  <!-- Badge row -->
  <rect x="442" y="298" width="130" height="22" rx="4" fill="#313244"/>
  <text x="507" y="313" font-family="monospace" font-size="10" fill="#a6e3a1" text-anchor="middle">✅ No explanations</text>
  <rect x="586" y="298" width="100" height="22" rx="4" fill="#313244"/>
  <text x="636" y="313" font-family="monospace" font-size="10" fill="#a6e3a1" text-anchor="middle">✅ Code-only</text>

  <!-- Footer -->
  <text x="410" y="368" font-family="monospace" font-size="11" fill="#585b70" text-anchor="middle">CortexDev · Built on Salesforce CodeGen-350M · LoRA Fine-Tuned</text>
